server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass https://simtrainer-api.ashypebble-e8f32780.norwayeast.azurecontainerapps.io/api/;
        proxy_set_header Host simtrainer-api.ashypebble-e8f32780.norwayeast.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    location /hubs/ {
        proxy_pass https://simtrainer-api.ashypebble-e8f32780.norwayeast.azurecontainerapps.io/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host simtrainer-api.ashypebble-e8f32780.norwayeast.azurecontainerapps.io;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
