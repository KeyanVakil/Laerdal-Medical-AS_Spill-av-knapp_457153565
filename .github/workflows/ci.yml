name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/SimTrainer.Tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --verbosity normal --logger "trx;LogFileName=results.trx"

  frontend:
    name: Frontend (Build & Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t simtrainer-api ./src/SimTrainer.Api

      - name: Build frontend image
        run: docker build -t simtrainer-frontend ./src/frontend
